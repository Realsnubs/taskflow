{% extends "base.html" %}
{% block title %}New Project{% endblock %}
{% block content %}

<div class="card shadow-sm">
  <div class="card-body">
    <h1 class="h4 mb-3">Create project</h1>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Save</button>
      <a class="btn btn-link" href="/projects/">Back</a>
    </form>
  </div>
</div>

{% endblock %}
