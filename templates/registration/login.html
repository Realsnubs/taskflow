{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="page-card p-4 p-md-5 border">

            <div class="mb-4 text-center">
                <h1 class="h2 fw-bold mb-2">Welcome back</h1>
                <p class="text-muted mb-0">Login to your account</p>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    {{ form.username }}
                </div>

                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    {{ form.password }}
                </div>

                {% if form.errors %}
                    <div class="alert alert-danger">
                        Invalid username or password
                    </div>
                {% endif %}

                <button type="submit" class="btn btn-primary w-100 mb-3">
                    Login
                </button>
            </form>

            <!-- 👇 ВОТ ТУТ КНОПКА РЕГИСТРАЦИИ -->
            <div class="text-center">
                <span class="text-muted">No account?</span>
                <a href="/register/" class="ms-2">Create one</a>
            </div>

        </div>
    </div>
</div>

<style>
    #id_username,
    #id_password {
        width: 100%;
        border-radius: 12px;
        border: 1px solid #ced4da;
        padding: 12px 14px;
        font-size: 16px;
        transition: all 0.2s ease;
    }

    #id_username:focus,
    #id_password:focus {
        outline: none;
        border-color: #86b7fe;
        box-shadow: 0 0 0 0.2rem rgba(13,110,253,.15);
    }

    body.dark-mode #id_username,
    body.dark-mode #id_password {
        background-color: #2a2a2a !important;
        color: #ffffff !important;
        border: 1px solid #555 !important;
    }

    body.dark-mode .form-label {
        color: #f1f1f1 !important;
    }
</style>
{% endblock %}
