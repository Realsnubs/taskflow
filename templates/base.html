{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TaskFlow{% endblock %}</title>

    <link rel="icon" href="{% static 'favicon.ico' %}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            color: #212529;
            transition: 0.25s;
        }

        /* NAVBAR */
        .topbar {
            background: #111827;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .brand {
            color: #fff;
            font-weight: 700;
            text-decoration: none;
            font-size: 18px;
        }

        .menu-btn {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: white;
            font-size: 20px;
        }

        .menu-wrap {
            position: relative;
        }

        .menu-panel {
            display: none;
            position: absolute;
            top: 110%;
            left: 0;
            min-width: 180px;
            background: #ffffff;
            border: 1px solid #ddd;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 8px;
            z-index: 1000;
        }

        .menu-panel.show {
            display: block;
        }

        .menu-panel a {
            display: block;
            padding: 10px;
            border-radius: 8px;
            color: #111;
            text-decoration: none;
        }

        .menu-panel a:hover {
            background: #f1f1f1;
        }

        /* CARDS */
        .page-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 0.125rem 0.5rem rgba(0,0,0,0.08);
            transition: 0.25s;
        }

        /* BADGE */
        .custom-badge {
            background-color: #dbeafe;
            color: #1d4ed8;
            border: 1px solid #93c5fd;
            font-weight: 600;
        }

        /* DARK MODE */
        body.dark-mode {
            background-color: #121212 !important;
            color: #f1f1f1 !important;
        }

        body.dark-mode .topbar {
            background: #0b0f19 !important;
        }

        body.dark-mode .page-card {
            background: #1e1e1e !important;
            border: 1px solid #333 !important;
        }

        body.dark-mode .menu-panel {
            background: #1e1e1e;
            border-color: #333;
        }

        body.dark-mode .menu-panel a {
            color: #fff;
        }

        body.dark-mode .menu-panel a:hover {
            background: #2a2a2a;
        }

        body.dark-mode .custom-badge {
            background-color: rgba(255,255,255,0.08);
            color: #e5e7eb;
            border: 1px solid rgba(255,255,255,0.15);
        }

        body.dark-mode .text-muted {
            color: #bdbdbd !important;
        }

        body.dark-mode input,
        body.dark-mode textarea {
            background: #2a2a2a !important;
            color: #fff !important;
            border: 1px solid #555 !important;
        }
    </style>
</head>

<body>

<header class="topbar">
    <div class="container-fluid px-4 py-3 d-flex justify-content-between align-items-center">

        <!-- LEFT -->
        <div class="d-flex align-items-center gap-3">
            <div class="menu-wrap">
                <button id="menuBtn" class="menu-btn">☰</button>

                <div id="menuPanel" class="menu-panel">
                    <a href="/">Landing</a>
<a href="/projects/">Projects</a>

{% if user.is_authenticated %}
    <form method="post" action="/accounts/logout/" class="m-0">
        {% csrf_token %}
        <button type="submit" class="dropdown-item text-danger">Logout</button>
    </form>
{% else %}
    <a href="/accounts/login/">Login</a>
    <a href="/register/">Register</a>
{% endif %}
                </div>
            </div>

            <a href="/" class="brand">TaskFlow</a>
        </div>

        <!-- RIGHT -->
        <div class="d-flex align-items-center gap-2">
            <button onclick="toggleTheme()" class="btn btn-outline-light btn-sm">
                🌙
            </button>

            {% if user.is_authenticated %}
                <span class="text-white">{{ user.username }}</span>
                <a href="/logout/" class="btn btn-outline-light btn-sm">Logout</a>
            {% else %}
    <div class="d-flex gap-2">
        <a href="/accounts/login/" class="btn btn-outline-light btn-sm">Login</a>
        <a href="/register/" class="btn btn-primary btn-sm">Register</a>
    </div>
{% endif %}
        </div>

    </div>
</header>

<div class="container py-4">
    {% block content %}{% endblock %}
</div>

<script>
function toggleTheme() {
    document.body.classList.toggle("dark-mode");
    localStorage.setItem(
        "theme",
        document.body.classList.contains("dark-mode") ? "dark" : "light"
    );
}

window.onload = function () {
    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
    }
};

const btn = document.getElementById("menuBtn");
const panel = document.getElementById("menuPanel");

btn.addEventListener("click", function(e) {
    e.stopPropagation();
    panel.classList.toggle("show");
});

document.addEventListener("click", function(e) {
    if (!panel.contains(e.target) && !btn.contains(e.target)) {
        panel.classList.remove("show");
    }
});
</script>

</body>
</html>
