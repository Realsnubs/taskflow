<!DOCTYPE html>
<html lang="en">
  {% load static %}
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TaskFlow{% endblock %}</title>

  <link rel="icon" href="{% static 'favicon_proj1.jpg' %}">

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="/projects/">TaskFlow</a>

      <div class="ms-auto">
        {% if user.is_authenticated %}
          <span class="navbar-text text-white me-3">
            {{ user.username }}
          </span>

          <form method="post" action="/accounts/logout/" class="d-inline">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
          </form>
        {% else %}
          <a class="btn btn-outline-light btn-sm" href="/accounts/login/">Login</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
