{% extends "base.html" %}
{% block title %}New Task{% endblock %}
{% block content %}

<div class="card shadow-sm">
  <div class="card-body">
    <h1 class="h4 mb-3">New task for: {{ project.name }}</h1>

    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button class="btn btn-primary" type="submit">Save</button>
      <a class="btn btn-link" href="/projects/{{ project.id }}/board/">Back</a>
    </form>
  </div>
</div>

{% endblock %}
